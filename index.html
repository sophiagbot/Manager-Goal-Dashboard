<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarterly Goal Tracker — 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117;--bg2:#161820;--bg3:#1d1f2a;--bg4:#252838;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#e8eaf0;--text2:#9094a8;--text3:#5a5e72;
    --west:#3b82f6;--west-bg:rgba(59,130,246,0.12);
    --east:#10b981;--east-bg:rgba(16,185,129,0.12);
    --done:#22c55e;--done-bg:rgba(34,197,94,0.1);
    --warn:#f59e0b;--danger:#ef4444;
    --accent:#6366f1;--accent-bg:rgba(99,102,241,0.15);
    --finserv:#f59e0b;--finserv-bg:rgba(245,158,11,0.12);
    --radius:10px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  /* ── HEADER ── */
  .header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
  .header-top{display:flex;align-items:center;justify-content:space-between;padding:16px 28px 0;gap:16px;flex-wrap:wrap}
  .header-left{display:flex;align-items:center;gap:14px}
  .header-logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);letter-spacing:0.04em}
  .header-title{font-size:16px;font-weight:600}
  .header-right{display:flex;align-items:center;gap:16px;padding-bottom:4px}
  .header-stats{display:flex;gap:20px;align-items:center}
  .hstat{text-align:right}
  .hstat-val{font-size:20px;font-weight:600;line-height:1}
  .hstat-label{font-size:11px;color:var(--text3);margin-top:2px}

  /* lock/unlock button */
  .lock-btn{font-family:'DM Mono',monospace;font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text3);transition:all 0.15s;display:flex;align-items:center;gap:6px}
  .lock-btn:hover{color:var(--text);border-color:var(--accent)}
  .lock-btn.unlocked{color:#22c55e;border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.08)}
  .readonly-badge{font-family:'DM Mono',monospace;font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(245,158,11,0.1);color:var(--warn);border:1px solid rgba(245,158,11,0.25)}

  /* ── QUARTER TABS ── */
  .qtab-bar{display:flex;gap:2px;padding:0 28px;margin-top:10px;border-top:1px solid var(--border)}
  .qtab{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:10px 20px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all 0.15s;letter-spacing:0.05em;position:relative;top:1px}
  .qtab:hover{color:var(--text2)}
  .qtab.active{color:#818cf8;border-bottom-color:#6366f1}
  .qtab-progress{font-size:10px;color:var(--text3);margin-left:6px}
  .qtab.active .qtab-progress{color:#818cf8;opacity:0.7}

  /* ── MAIN ── */
  .main{padding:20px 28px 40px}

  /* ── LOADING / ERROR ── */
  .state-msg{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
  .state-msg .spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── REGION ── */
  .region-header{display:flex;align-items:center;gap:12px;margin:20px 0 12px}
  .region-pill{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;letter-spacing:0.06em;text-transform:uppercase}
  .region-pill.west{background:var(--west-bg);color:var(--west);border:1px solid rgba(59,130,246,0.25)}
  .region-pill.east{background:var(--east-bg);color:var(--east);border:1px solid rgba(16,185,129,0.25)}
  .region-divider{flex:1;height:1px;background:var(--border)}
  .region-progress-text{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}

  /* ── TABLE ── */
  .grid-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;min-width:900px}
  thead tr{background:var(--bg3)}
  th{padding:10px 14px;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;border-bottom:1px solid var(--border);white-space:nowrap}
  th.goal-col{text-align:left;min-width:260px}
  th.sc-col{text-align:center;width:155px}
  tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,0.02)}
  tbody tr.cat-header-row{background:var(--bg3)}
  td{padding:0;vertical-align:top}
  .cat-label{padding:8px 14px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;display:flex;align-items:center;gap:8px}
  .cat-icon{font-size:13px}
  .goal-cell{padding:10px 14px;display:flex;align-items:flex-start;gap:10px}
  .goal-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);min-width:18px;padding-top:2px}
  .goal-text-wrap{flex:1}
  .goal-text{font-size:13px;line-height:1.45;color:var(--text)}
  .goal-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
  .gtag{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500}
  .gtag-west{background:var(--west-bg);color:var(--west)}
  .gtag-nm{background:var(--finserv-bg);color:var(--finserv)}

  /* ── SC HEADER ── */
  .sc-th{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px}
  .sc-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
  .sc-th-name-btn{font-size:12px;font-weight:500;color:var(--text);text-transform:none;letter-spacing:0;background:none;border:none;padding:2px 6px;border-radius:4px;transition:background 0.15s;font-family:'DM Sans',sans-serif}
  .sc-th-name-btn.clickable{cursor:pointer}
  .sc-th-name-btn.clickable:hover{background:rgba(255,255,255,0.07);color:#fff}
  .sc-th-prog{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}
  .sc-th-bar{width:50px;height:3px;border-radius:2px;background:var(--border2);overflow:hidden}
  .sc-th-bar-fill{height:100%;border-radius:2px;transition:width 0.4s}
  .fill-green{background:var(--done)}.fill-amber{background:var(--warn)}.fill-red{background:var(--danger)}

  /* ── CELLS ── */
  .sc-cell{padding:6px 5px;vertical-align:top}
  .cell-simple{display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);padding:8px 4px;min-height:52px;transition:background 0.15s}
  .cell-simple.editable{cursor:pointer}
  .cell-simple.editable:hover{background:rgba(255,255,255,0.04)}
  .cell-simple.is-done{background:var(--done-bg)}
  .cell-simple.editable.is-done:hover{background:rgba(34,197,94,0.16)}
  .cell-simple.na{opacity:0.2;cursor:default}
  .chk-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
  .cell-simple.is-done .chk-circle{background:var(--done);border-color:var(--done)}
  .chk-circle svg{display:none}
  .cell-simple.is-done .chk-circle svg{display:block}

  .cell-eng{display:flex;flex-direction:column;gap:3px;padding:5px 4px;min-height:52px}
  .eng-entry{display:flex;align-items:flex-start;gap:4px;background:var(--done-bg);border-radius:4px;padding:4px 6px;border:1px solid rgba(34,197,94,0.15)}
  .eng-entry-body{flex:1;min-width:0}
  .eng-entry-customer{font-size:10px;font-weight:600;color:var(--done);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:115px}
  .eng-entry-sub{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:115px;margin-top:1px}
  .eng-entry-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;line-height:1;padding:1px 2px;flex-shrink:0;opacity:0;transition:opacity 0.15s;margin-top:1px}
  .eng-entry:hover .eng-entry-del{opacity:1}
  .eng-add-btn{display:flex;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--text3);cursor:pointer;border:1px dashed var(--border2);border-radius:4px;padding:4px 5px;transition:all 0.15s;margin-top:1px}
  .eng-add-btn:hover{color:var(--accent);border-color:rgba(99,102,241,0.5);background:var(--accent-bg)}

  /* ── ADD GOAL ROW ── */
  .add-goal-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;color:var(--text3);font-size:12px;cursor:pointer;border-top:1px solid var(--border);transition:color 0.15s}
  .add-goal-row:hover{color:var(--accent)}

  /* ── MODALS ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:24px;width:min(500px,92vw);max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.6)}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
  .modal-head h3{font-size:15px;font-weight:600;line-height:1.35}
  .modal-sc-tag{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
  .entry-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
  .entry-list:empty{display:none}
  .entry-row{display:flex;align-items:flex-start;gap:8px;background:var(--bg4);border-radius:var(--radius-sm);padding:8px 10px;border:1px solid var(--border)}
  .entry-row-info{flex:1;min-width:0}
  .entry-row-customer{font-size:13px;color:var(--text);font-weight:500}
  .entry-row-meta{font-size:11px;color:var(--text2);margin-top:2px}
  .entry-row-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;flex-shrink:0;line-height:1;margin-top:1px}
  .entry-row-del:hover{background:rgba(239,68,68,0.12);color:var(--danger)}
  .section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:12px 0 8px;margin-top:4px;border-top:1px solid var(--border);display:block}
  .entry-list:empty + .section-label{border-top:none;padding-top:0;margin-top:0}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.06em}
  .field input,.field textarea,.field select{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;outline:none;transition:border-color 0.15s}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:80px}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s}
  .btn:hover{background:var(--bg4);color:var(--text)}
  .btn-primary{background:var(--accent);color:#fff;border-color:transparent}
  .btn-primary:hover{background:#4f52d9}
  .btn-danger{color:var(--danger);border-color:rgba(239,68,68,0.3)}
  .btn-danger:hover{background:rgba(239,68,68,0.1)}

  /* PIN modal */
  .pin-modal-inner{text-align:center;padding:8px 0}
  .pin-modal-inner h3{font-size:16px;font-weight:600;margin-bottom:6px}
  .pin-modal-inner p{font-size:13px;color:var(--text3);margin-bottom:20px}
  .pin-input{font-family:'DM Mono',monospace;font-size:28px;letter-spacing:0.3em;text-align:center;width:160px;padding:10px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);outline:none}
  .pin-input:focus{border-color:var(--accent)}
  .pin-error{font-size:12px;color:var(--danger);margin-top:8px;min-height:18px}

  /* SC notes */
  .sc-notes-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .sc-notes-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
  .sc-notes-name{font-size:17px;font-weight:600}
  .sc-notes-sub{font-size:12px;color:var(--text3);margin-top:2px}
  .notes-saved{font-size:11px;color:var(--done);opacity:0;transition:opacity 0.3s;margin-right:auto}
  .notes-saved.show{opacity:1}

  /* Unmark modal */
  .unmark-body{text-align:center;padding:8px 0 4px}
  .unmark-body p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5}

  /* Sync indicator */
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background 0.3s}
  .sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite}
  .sync-dot.synced{background:var(--done)}
  .sync-dot.error{background:var(--danger)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .sync-label{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:13px;color:var(--text);z-index:500;opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}

  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-left">
      <div class="header-logo">ServiceNow</div>
      <div class="header-title">Quarterly Goal Tracker</div>
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">2026</span>
    </div>
    <div class="header-right">
      <div style="display:flex;align-items:center;gap:6px">
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-label" id="sync-label">loading</span>
      </div>
      <div class="header-stats" id="header-stats"></div>
      <div id="auth-control"></div>
    </div>
  </div>
  <div class="qtab-bar" id="qtab-bar"></div>
</div>

<div class="main" id="main">
  <div class="state-msg"><div class="spinner"></div>Loading tracker data...</div>
</div>

<!-- Engagement multi-entry modal -->
<div class="modal-overlay" id="eng-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="eng-modal-title"></h3>
      <span class="modal-sc-tag" id="eng-modal-sc"></span>
    </div>
    <div class="entry-list" id="eng-entry-list"></div>
    <span class="section-label">Add engagement</span>
    <div class="field"><label>Customer / Account</label><input type="text" id="eng-customer" placeholder="e.g. Wells Fargo, Kaiser Permanente"></div>
    <div class="field"><label>Engagement Type</label>
      <select id="eng-type">
        <option value="">— select type —</option>
        <option>Workshop</option><option>Webinar</option><option>Demo</option>
        <option>CBR (Customer Business Review)</option><option>Office Hours</option>
        <option>QBR</option><option>EBC (Executive Briefing)</option>
        <option>Discovery Call</option><option>Account Planning</option>
        <option>Microsite Delivery</option><option>Pipeline Gen Motion</option>
        <option>1:1 Meeting</option><option>Other</option>
      </select>
    </div>
    <div class="field"><label>Date</label><input type="date" id="eng-date"></div>
    <div class="field"><label>Notes</label><textarea id="eng-notes" placeholder="Outcome, link, context..."></textarea></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeEngModal()">Close</button>
      <button class="btn btn-primary" onclick="saveEngEntry()">+ Add entry</button>
    </div>
  </div>
</div>

<!-- SC Notes modal -->
<div class="modal-overlay" id="notes-modal">
  <div class="modal">
    <div class="sc-notes-head">
      <div class="sc-notes-avatar" id="notes-avatar"></div>
      <div>
        <div class="sc-notes-name" id="notes-sc-name"></div>
        <div class="sc-notes-sub" id="notes-quarter-label"></div>
      </div>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="notes-textarea" rows="10" placeholder="Coaching observations, context, priorities, follow-ups..."></textarea>
    </div>
    <div class="modal-btns">
      <span class="notes-saved" id="notes-saved-indicator">Saved ✓</span>
      <button class="btn" onclick="closeNotesModal()">Close</button>
      <button class="btn btn-primary" onclick="saveNotes()">Save notes</button>
    </div>
  </div>
</div>

<!-- PIN modal -->
<div class="modal-overlay" id="pin-modal">
  <div class="modal" style="max-width:320px">
    <div class="pin-modal-inner">
      <h3>Manager access</h3>
      <p>Enter your PIN to unlock editing</p>
      <input class="pin-input" type="password" id="pin-input" maxlength="4" placeholder="····" oninput="onPinInput()" onkeydown="if(event.key==='Enter')submitPin()">
      <div class="pin-error" id="pin-error"></div>
      <div class="modal-btns" style="justify-content:center;margin-top:16px">
        <button class="btn" onclick="closePinModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitPin()">Unlock</button>
      </div>
    </div>
  </div>
</div>

<!-- Simple goal unmark modal -->
<div class="modal-overlay" id="unmark-modal">
  <div class="modal" style="max-width:340px">
    <div class="unmark-body">
      <p id="unmark-text"></p>
      <div class="modal-btns" style="justify-content:center">
        <button class="btn" onclick="closeUnmarkModal()">Cancel</button>
        <button class="btn btn-danger" onclick="doUnmark()">Unmark complete</button>
      </div>
    </div>
  </div>
</div>

<!-- Add custom goal modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-head"><h3>Add custom goal</h3></div>
    <div class="field"><label>Goal description</label><textarea id="ag-text" placeholder="Describe the goal..." rows="3"></textarea></div>
    <div class="field"><label>Category</label>
      <select id="ag-cat">
        <option value="CRM & Pipeline Hygiene">📋 CRM & Pipeline Hygiene</option>
        <option value="Customer Engagement">🤝 Customer Engagement</option>
        <option value="AI & Platform Adoption">⚡ AI & Platform Adoption</option>
        <option value="Networking & Mentorship">🌐 Networking & Mentorship</option>
      </select>
    </div>
    <div class="field"><label>Applies to SC</label><select id="ag-sc"></select></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewGoal()">Add goal</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── JSONBIN CONFIG ────────────────────────────────────────────
const JSONBIN_KEY  = '$2a$10$5Cmk.Nm1w9FDZYnYVcKiPOaN/tmHtKuP42s6Az.9y8FnjbYbZif0.';
const MANAGER_PIN  = '1014';
let   BIN_ID       = null; // resolved on first load
const BIN_NAME     = 'qgt_2026';

async function apiFetch(url, opts={}) {
  const headers = {
    'X-Master-Key': JSONBIN_KEY,
    'Content-Type': 'application/json',
    ...(opts.headers||{})
  };
  const res = await fetch(url, { ...opts, headers });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function resolveOrCreateBin() {
  // List bins and find ours by name
  try {
    const data = await apiFetch('https://api.jsonbin.io/v3/b', { method:'GET', headers:{'X-Bin-Meta':'true'} });
    if (data && data.length) {
      const found = data.find(b => b.record && b.record.name === BIN_NAME);
      if (found) { BIN_ID = found.record.id; return; }
    }
  } catch(e) {}
  // Create new bin
  const created = await apiFetch('https://api.jsonbin.io/v3/b', {
    method:'POST',
    headers:{'X-Bin-Name': BIN_NAME, 'X-Bin-Private':'true'},
    body: JSON.stringify({ allState:{}, activeQ:'q2' })
  });
  BIN_ID = created.metadata.id;
}

async function loadFromBin() {
  await resolveOrCreateBin();
  const data = await apiFetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`);
  return data.record || { allState:{}, activeQ:'q2' };
}

async function saveToBin(payload) {
  await apiFetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method:'PUT',
    body: JSON.stringify(payload)
  });
}

// ── QUARTERS / TEAM CONFIG ────────────────────────────────────
const QUARTERS = [

// ── STATE ─────────────────────────────────────────────────────
let allState  = {};
let activeQ   = 'q2';
let isManager = false;
let saveTimer = null;

function qState(qId) {
  if (!allState[qId]) allState[qId] = { goals:{}, customGoals:[], notes:{} };
  return allState[qId];
}
function goals(qId)  { return qState(qId).goals; }
function cGoals(qId) { return qState(qId).customGoals; }
function qNotes(qId) { return qState(qId).notes; }

function ensureSCs(qId) {
  const g = goals(qId);
  for (const sc of ALL_SCS) { if (!g[sc.id]) g[sc.id] = {}; }
}

// ── SYNC ──────────────────────────────────────────────────────
function setSyncState(state, msg) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = msg;
}

async function load() {
  setSyncState('syncing', 'loading…');
  try {
    const data = await loadFromBin();
    allState = data.allState || {};
    activeQ  = data.activeQ  || 'q2';
    for (const q of QUARTERS) ensureSCs(q.id);
    populateAddScSelect();
    setSyncState('synced', 'live');
    render();
  } catch(e) {
    setSyncState('error', 'offline');
    document.getElementById('main').innerHTML = `<div class="state-msg">⚠️ Could not load data. Check your connection and refresh.</div>`;
  }
}

function scheduleSave() {
  setSyncState('syncing', 'saving…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await saveToBin({ allState, activeQ });
      setSyncState('synced', 'saved ✓');
      setTimeout(() => setSyncState('synced', 'live'), 2000);
    } catch(e) {
      setSyncState('error', 'save failed');
      showToast('⚠️ Save failed — check connection');
    }
  }, 800);
}

// ── HELPERS ───────────────────────────────────────────────────
function isEng(goalId) { return MULTI_ENG_IDS.has(goalId); }

function getCell(qId, scId, goalId) {
  const def = isEng(goalId) ? {entries:[]} : {done:false};
  const g   = goals(qId);
  return (g[scId] && g[scId][goalId]) || def;
}

function isDone(qId, scId, goalId) {
  const c = getCell(qId, scId, goalId);
  return isEng(goalId) ? (c.entries && c.entries.length > 0) : !!c.done;
}

function goalAppliesTo(goal, scId) {
  const sc = ALL_SCS.find(s => s.id === scId);
  if (!sc) return false;
  if (goal.tags.includes('west-only')        && !sc.tags.includes('west'))        return false;
  if (goal.tags.includes('nick-marcus-only') && !sc.tags.includes('nick-marcus')) return false;
  if (goal.tags.includes('group1')           && !['marcus','suhaib','mia'].includes(scId)) return false;
  if (goal.tags.includes('group2')           && !['nick','geena','mo'].includes(scId))     return false;
  if (goal.scIds && !goal.scIds.includes(scId)) return false;
  return true;
}

function progColor(pct) { return pct>=75?'#22c55e':pct>=40?'#f59e0b':'#ef4444'; }

function getProgress(qId, scId) {
  const all = [...BASE_GOALS, ...cGoals(qId)];
  const applicable = all.filter(g => goalAppliesTo(g, scId));
  return { total: applicable.length, done: applicable.filter(g => isDone(qId, scId, g.id)).length };
}

function getQProgress(qId) {
  let t=0, d=0;
  for (const sc of ALL_SCS) { const p=getProgress(qId,sc.id); t+=p.total; d+=p.done; }
  return { total:t, done:d, pct: t ? Math.round(d/t*100) : 0 };
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── RENDER ────────────────────────────────────────────────────
function render() { renderAuthControl(); renderTabs(); renderHeader(); renderMain(); }

function renderAuthControl() {
  const el = document.getElementById('auth-control');
  if (isManager) {
    el.innerHTML = `<button class="lock-btn unlocked" onclick="lockManager()">🔓 Manager — lock</button>`;
  } else {
    el.innerHTML = `
      <span class="readonly-badge">View only</span>
      <button class="lock-btn" onclick="openPinModal()">🔒 Manager login</button>`;
  }
}

function renderTabs() {
  document.getElementById('qtab-bar').innerHTML = QUARTERS.map(q => {
    const p = getQProgress(q.id);
    const active = q.id === activeQ ? 'active' : '';
    const progStr = p.total ? `${p.pct}%` : '';
    return `<div class="qtab ${active}" onclick="switchQ('${q.id}')">${q.label}<span class="qtab-progress">${progStr}</span></div>`;
  }).join('');
}

function renderHeader() {
  const qId = activeQ;
  let tGoals=0, tDone=0, perfect=0;
  for (const sc of ALL_SCS) {
    const p=getProgress(qId,sc.id); tGoals+=p.total; tDone+=p.done;
    if(p.total>0 && p.done===p.total) perfect++;
  }
  const pct = tGoals ? Math.round(tDone/tGoals*100) : 0;
  const q   = QUARTERS.find(q=>q.id===qId);
  document.getElementById('header-stats').innerHTML = `
    <div class="hstat"><div class="hstat-val" style="color:${progColor(pct)}">${pct}%</div><div class="hstat-label">${q.full} completion</div></div>
    <div class="hstat"><div class="hstat-val">${tDone}<span style="font-size:13px;color:var(--text3)"> / ${tGoals}</span></div><div class="hstat-label">goals done</div></div>
    <div class="hstat"><div class="hstat-val">${perfect}</div><div class="hstat-label">at 100%</div></div>
  `;
}

function renderMain() {
  const qId = activeQ;
  let html = '';

  for (const region of REGIONS) {
    let rT=0, rD=0;
    for (const sc of region.scs) { const p=getProgress(qId,sc.id); rT+=p.total; rD+=p.done; }
    const rPct = rT ? Math.round(rD/rT*100) : 0;

    html += `<div class="region-header">
      <div class="region-pill ${region.cls}">${region.label}</div>
      <div class="region-divider"></div>
      <div class="region-progress-text">${rD}/${rT} · ${rPct}%</div>
    </div><div class="grid-wrap"><table>`;

    html += `<thead><tr><th class="goal-col">Goal</th>`;
    for (const sc of region.scs) {
      const p=getProgress(qId,sc.id), pct=p.total?Math.round(p.done/p.total*100):0;
      const fc=pct>=75?'fill-green':pct>=40?'fill-amber':'fill-red';
      const hasNotes = !!(qNotes(qId)[sc.id] && qNotes(qId)[sc.id].trim());
      const clickable = isManager ? 'clickable' : '';
      const onclick   = isManager ? `onclick="openNotesModal('${sc.id}')"` : '';
      html += `<th class="sc-col"><div class="sc-th">
        <div class="sc-avatar" style="background:${sc.bg};color:${sc.color}">${sc.initials}</div>
        <button class="sc-th-name-btn ${clickable}" ${onclick} title="${isManager?'View/edit notes':''}">
          ${esc(sc.name)}${hasNotes?' <span style="font-size:9px;opacity:0.6">●</span>':''}
        </button>
        <div class="sc-th-bar"><div class="sc-th-bar-fill ${fc}" style="width:${pct}%"></div></div>
        <div class="sc-th-prog">${p.done}/${p.total}</div>
      </div></th>`;
    }
    html += `</tr></thead><tbody>`;

    const allGoals = [...BASE_GOALS, ...cGoals(qId)];
    let gNum = 1;
    for (const cat of CATS) {
      const catGoals = allGoals.filter(g => g.cat===cat);
      if (!catGoals.some(g => region.scs.some(sc => goalAppliesTo(g,sc.id)))) continue;
      html += `<tr class="cat-header-row"><td colspan="${region.scs.length+1}"><div class="cat-label"><span class="cat-icon">${CAT_ICONS[cat]}</span>${cat}</div></td></tr>`;

      for (const goal of catGoals) {
        if (!region.scs.some(sc => goalAppliesTo(goal,sc.id))) continue;
        const eng      = isEng(goal.id) || !!goal.scIds;
        const isCustom = !!goal.scIds;
        const tagHtml  = (goal.tags||[]).map(t =>
          t==='west-only'?`<span class="gtag gtag-west">West</span>`:
          t==='nick-marcus-only'?`<span class="gtag gtag-nm">Nick & Marcus</span>`:''
        ).filter(Boolean).join('');

        html += `<tr><td><div class="goal-cell">
          <div class="goal-num">${gNum++}</div>
          <div class="goal-text-wrap">
            <div class="goal-text">${esc(goal.text)}</div>
            ${tagHtml||isCustom||eng?`<div class="goal-tags">${tagHtml}${eng?'<span class="gtag" style="background:rgba(56,189,248,0.12);color:#38bdf8">customer engagement</span>':''}${isCustom?'<span class="gtag" style="background:rgba(99,102,241,0.15);color:#818cf8">custom</span>':''}</div>`:''}
          </div>
          ${isCustom&&isManager?`<button onclick="removeCustomGoal('${goal.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;flex-shrink:0" title="Remove">✕</button>`:''}
        </div></td>`;

        for (const sc of region.scs) {
          if (!goalAppliesTo(goal,sc.id)) {
            html += `<td class="sc-cell"><div class="cell-simple na"><div class="chk-circle" style="border-color:var(--border)"></div></div></td>`;
            continue;
          }
          if (eng) {
            const entries   = getCell(qId,sc.id,goal.id).entries || [];
            const entryRows = entries.map(e => `
              <div class="eng-entry">
                <div class="eng-entry-body">
                  <div class="eng-entry-customer">${esc(e.customer||'—')}</div>
                  ${e.engType||e.date?`<div class="eng-entry-sub">${esc([e.engType,e.date].filter(Boolean).join(' · '))}</div>`:''}
                </div>
                ${isManager?`<button class="eng-entry-del" onclick="event.stopPropagation();deleteEntry('${sc.id}','${goal.id}','${e.id}')" title="Remove">✕</button>`:''}
              </div>`).join('');
            const addBtn = isManager
              ? `<div class="eng-add-btn" onclick="openEngModal('${sc.id}','${goal.id}')">+ add engagement</div>`
              : (entries.length===0 ? `<div style="display:flex;align-items:center;justify-content:center;min-height:36px;color:var(--text3);font-size:10px">—</div>` : '');
            html += `<td class="sc-cell"><div class="cell-eng">${entryRows}${addBtn}</div></td>`;
          } else {
            const done = isDone(qId,sc.id,goal.id);
            const fn   = isManager
              ? (done ? `openUnmarkModal('${sc.id}','${goal.id}')` : `quickToggle('${sc.id}','${goal.id}')`)
              : '';
            html += `<td class="sc-cell"><div class="cell-simple ${done?'is-done':''} ${isManager?'editable':''}" ${fn?`onclick="${fn}"`:'style="cursor:default"'}>
              <div class="chk-circle">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
            </div></td>`;
          }
        }
        html += `</tr>`;
      }
    }

    if (isManager) {
      html += `<tr><td colspan="${region.scs.length+1}">
        <div class="add-goal-row" onclick="openAddModal('${region.scs.map(s=>s.id).join(',')}')"><span>+</span> add custom goal for ${region.label} team</div>
      </td></tr>`;
    }
    html += `</tbody></table></div>`;
  }

  if (isManager) {
    html += `<div style="margin-top:16px"><div class="add-goal-row" style="border:1px solid var(--border);border-radius:var(--radius);padding:10px" onclick="openAddModal('all')"><span>+</span> add custom goal for entire team</div></div>`;
  }

  document.getElementById('main').innerHTML = html;
}

function switchQ(qId) {
  activeQ = qId;
  scheduleSave();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── PIN / AUTH ────────────────────────────────────────────────
function openPinModal() {
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-modal').classList.add('open');
  setTimeout(() => document.getElementById('pin-input').focus(), 100);
}
function closePinModal() { document.getElementById('pin-modal').classList.remove('open'); }
function onPinInput() { document.getElementById('pin-error').textContent = ''; }
function submitPin() {
  const val = document.getElementById('pin-input').value.trim();
  if (val === MANAGER_PIN) {
    isManager = true;
    closePinModal();
    render();
    showToast('Manager mode unlocked 🔓');
  } else {
    document.getElementById('pin-error').textContent = 'Incorrect PIN — try again';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  }
}
function lockManager() { isManager = false; render(); showToast('Locked — view only mode'); }

// ── ENGAGEMENT MODAL ──────────────────────────────────────────
let eScId=null, eGoalId=null;

function openEngModal(scId, goalId) {
  if (!isManager) return;
  eScId=scId; eGoalId=goalId;
  const sc   = ALL_SCS.find(s=>s.id===scId);
  const goal = [...BASE_GOALS,...cGoals(activeQ)].find(g=>g.id===goalId);
  document.getElementById('eng-modal-title').textContent = goal.text;
  document.getElementById('eng-modal-sc').textContent    = sc.name;
  document.getElementById('eng-modal-sc').style.background = sc.bg;
  document.getElementById('eng-modal-sc').style.color      = sc.color;
  document.getElementById('eng-customer').value = '';
  document.getElementById('eng-type').value     = '';
  document.getElementById('eng-date').value     = new Date().toISOString().slice(0,10);
  document.getElementById('eng-notes').value    = '';
  refreshEntryList();
  document.getElementById('eng-modal').classList.add('open');
}

function refreshEntryList() {
  const entries = getCell(activeQ,eScId,eGoalId).entries || [];
  document.getElementById('eng-entry-list').innerHTML = entries.map(e=>`
    <div class="entry-row">
      <div class="entry-row-info">
        <div class="entry-row-customer">${esc(e.customer||'—')}</div>
        <div class="entry-row-meta">${esc([e.engType,e.date,e.notes].filter(Boolean).join(' · '))}</div>
      </div>
      <button class="entry-row-del" onclick="deleteEntryModal('${e.id}')">✕</button>
    </div>`).join('');
}

function saveEngEntry() {
  const customer = document.getElementById('eng-customer').value.trim();
  const engType  = document.getElementById('eng-type').value;
  const date     = document.getElementById('eng-date').value;
  const notes_   = document.getElementById('eng-notes').value.trim();
  if (!customer && !engType) { showToast('Please enter a customer or engagement type'); return; }
  const g = goals(activeQ);
  if (!g[eScId]) g[eScId]={};
  if (!g[eScId][eGoalId]||!g[eScId][eGoalId].entries) g[eScId][eGoalId]={entries:[]};
  g[eScId][eGoalId].entries.push({id:'e_'+Date.now(),customer,engType,date,notes:notes_});
  scheduleSave();
  document.getElementById('eng-customer').value='';
  document.getElementById('eng-type').value='';
  document.getElementById('eng-notes').value='';
  refreshEntryList(); render();
  showToast('Entry added ✓');
}

function deleteEntryModal(entryId) {
  const g = goals(activeQ);
  if (!g[eScId]||!g[eScId][eGoalId]) return;
  g[eScId][eGoalId].entries = g[eScId][eGoalId].entries.filter(e=>e.id!==entryId);
  scheduleSave(); refreshEntryList(); render();
}

function deleteEntry(scId,goalId,entryId) {
  const g = goals(activeQ);
  if (!g[scId]||!g[scId][goalId]) return;
  g[scId][goalId].entries = g[scId][goalId].entries.filter(e=>e.id!==entryId);
  scheduleSave(); render(); showToast('Entry removed');
}

function closeEngModal(){document.getElementById('eng-modal').classList.remove('open');eScId=null;eGoalId=null;}

// ── SC NOTES MODAL ────────────────────────────────────────────
let notesScId=null;

function openNotesModal(scId) {
  if (!isManager) return;
  notesScId=scId;
  const sc = ALL_SCS.find(s=>s.id===scId);
  const q  = QUARTERS.find(q=>q.id===activeQ);
  document.getElementById('notes-avatar').textContent       = sc.initials;
  document.getElementById('notes-avatar').style.background  = sc.bg;
  document.getElementById('notes-avatar').style.color       = sc.color;
  document.getElementById('notes-sc-name').textContent      = sc.name;
  document.getElementById('notes-quarter-label').textContent = `${q.full} · ${q.months}`;
  document.getElementById('notes-textarea').value           = qNotes(activeQ)[scId]||'';
  document.getElementById('notes-saved-indicator').classList.remove('show');
  document.getElementById('notes-modal').classList.add('open');
}

function saveNotes() {
  if (!notesScId) return;
  qNotes(activeQ)[notesScId] = document.getElementById('notes-textarea').value;
  scheduleSave(); render();
  const ind = document.getElementById('notes-saved-indicator');
  ind.classList.add('show');
  setTimeout(()=>ind.classList.remove('show'), 2000);
}

function closeNotesModal(){document.getElementById('notes-modal').classList.remove('open');notesScId=null;}

// ── SIMPLE TOGGLE ─────────────────────────────────────────────
let uScId=null, uGoalId=null;

function quickToggle(scId,goalId) {
  if (!isManager) return;
  const g = goals(activeQ);
  if (!g[scId]) g[scId]={};
  g[scId][goalId]={done:true};
  scheduleSave(); render(); showToast('Goal marked complete ✓');
}

function openUnmarkModal(scId,goalId) {
  if (!isManager) return;
  uScId=scId; uGoalId=goalId;
  const goal=[...BASE_GOALS,...cGoals(activeQ)].find(g=>g.id===goalId);
  document.getElementById('unmark-text').textContent=`Unmark "${goal.text}" as complete?`;
  document.getElementById('unmark-modal').classList.add('open');
}
function doUnmark() {
  const g = goals(activeQ);
  if(g[uScId]) g[uScId][uGoalId]={done:false};
  scheduleSave(); closeUnmarkModal(); render(); showToast('Goal unmarked');
}
function closeUnmarkModal(){document.getElementById('unmark-modal').classList.remove('open');uScId=null;uGoalId=null;}

// ── ADD CUSTOM GOAL ───────────────────────────────────────────
let addTargetSCIds=[];
function populateAddScSelect(){
  document.getElementById('ag-sc').innerHTML=ALL_SCS.map(sc=>`<option value="${sc.id}">${sc.name}</option>`).join('');
}
function openAddModal(str){
  if(!isManager) return;
  addTargetSCIds=str==='all'?ALL_SC_IDS:str.split(',');
  document.getElementById('ag-text').value='';
  if(addTargetSCIds.length===1) document.getElementById('ag-sc').value=addTargetSCIds[0];
  document.getElementById('add-modal').classList.add('open');
}
function closeAddModal(){document.getElementById('add-modal').classList.remove('open');}
function saveNewGoal(){
  const text=document.getElementById('ag-text').value.trim();
  const cat =document.getElementById('ag-cat').value;
  if(!text) return;
  const scIds=addTargetSCIds.length>1?addTargetSCIds:[document.getElementById('ag-sc').value];
  cGoals(activeQ).push({id:'custom_'+Date.now(),cat,text,tags:[],scIds});
  scheduleSave(); closeAddModal(); render(); showToast('Custom goal added');
}
function removeCustomGoal(id){
  qState(activeQ).customGoals=cGoals(activeQ).filter(g=>g.id!==id);
  scheduleSave(); render(); showToast('Goal removed');
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── MODAL CLOSE ON BACKDROP ───────────────────────────────────
['eng-modal','notes-modal','pin-modal','unmark-modal','add-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this){
      if(id==='eng-modal') closeEngModal();
      else if(id==='notes-modal') closeNotesModal();
      else if(id==='pin-modal') closePinModal();
      else if(id==='unmark-modal') closeUnmarkModal();
      else if(id==='add-modal') closeAddModal();
    }
  });
});

load();
